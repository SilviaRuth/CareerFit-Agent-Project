name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check app tests

      - name: Run tests
        run: python -m pytest -q

      - name: Build Docker image
        run: docker build -t careerfit-agent:ci .

      - name: Smoke test Docker container
        run: |
          docker run -d --rm --name careerfit-agent-ci -p 8000:8000 careerfit-agent:ci
          trap 'docker stop careerfit-agent-ci >/dev/null 2>&1 || true' EXIT
          python - <<'PY'
          import json
          import time
          import urllib.request

          last_error = None
          for _ in range(30):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=2) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  assert payload == {"status": "ok"}, payload
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"Container health check failed: {last_error}")
          PY
